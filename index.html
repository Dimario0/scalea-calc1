<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Календарь аренды</title>
<style>
body{
    font-family: Arial;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
button{
    padding:6px 10px;
    margin:2px;
    cursor:pointer;
}
.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    margin-top:20px;
}
.day{
    background:white;
    padding:10px;
    min-height:70px;
    border-radius:6px;
    cursor:pointer;
}
.booked{
    background:#fecaca;
}
.stats{
    margin-top:20px;
    padding:10px;
    background:white;
    border-radius:6px;
}
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}
.modal-content{
    background:white;
    padding:20px;
    border-radius:8px;
    width:300px;
}
input{
    width:100%;
    padding:6px;
    margin-bottom:8px;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <button onclick="prevMonth()">◀</button>
        <h2 id="monthTitle"></h2>
        <button onclick="nextMonth()">▶</button>
    </div>

    <div class="calendar" id="calendar"></div>

    <div class="stats">
        <div id="monthIncome"></div>
        <div id="yearIncome"></div>
    </div>

    <button onclick="exportData()">Экспорт</button>
    <input type="file" onchange="importData(event)">
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Бронирование</h3>
        <input type="date" id="checkIn">
        <input type="date" id="checkOut">
        <input type="number" id="price" placeholder="Цена за ночь">
        <button onclick="saveBooking()">Сохранить</button>
        <button onclick="closeModal()">Отмена</button>
    </div>
</div>

<script>

let state = {
    bookings: JSON.parse(localStorage.getItem("bookings")) || [],
    currentDate: new Date()
};

function save(){
    localStorage.setItem("bookings", JSON.stringify(state.bookings));
}

function toDate(str){
    return new Date(str);
}

function formatDate(d){
    return d.toISOString().split("T")[0];
}

function isBooked(date){
    return state.bookings.some(b=>{
        return date >= toDate(b.checkIn) && date < toDate(b.checkOut);
    });
}

function render(){
    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const year = state.currentDate.getFullYear();
    const month = state.currentDate.getMonth();

    const firstDay = new Date(year,month,1);
    const lastDay = new Date(year,month+1,0);

    document.getElementById("monthTitle").innerText =
        firstDay.toLocaleString("ru",{month:"long"}) + " " + year;

    for(let i=1;i<=lastDay.getDate();i++){
        const date = new Date(year,month,i);
        const div = document.createElement("div");
        div.className="day";
        div.innerText=i;

        if(isBooked(date)){
            div.classList.add("booked");
        }

        div.onclick=()=>{
            openModal(formatDate(date));
        };

        calendar.appendChild(div);
    }

    updateStats();
}

function updateStats(){
    const year = state.currentDate.getFullYear();
    const month = state.currentDate.getMonth();

    let monthIncome = 0;
    let yearIncome = 0;

    state.bookings.forEach(b=>{
        let d = toDate(b.checkIn);
        const end = toDate(b.checkOut);

        while(d < end){
            if(d.getFullYear() === year){
                yearIncome += b.price;
                if(d.getMonth() === month){
                    monthIncome += b.price;
                }
            }
            d.setDate(d.getDate()+1);
        }
    });

    document.getElementById("monthIncome").innerText =
        "Доход за месяц: € " + monthIncome;

    document.getElementById("yearIncome").innerText =
        "Доход за год: € " + yearIncome;
}

function openModal(date){
    document.getElementById("modal").style.display="flex";
    document.getElementById("checkIn").value=date;
    document.getElementById("checkOut").value=date;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function saveBooking(){
    const checkIn = document.getElementById("checkIn").value;
    const checkOut = document.getElementById("checkOut").value;
    const price = parseFloat(document.getElementById("price").value);

    if(!checkIn || !checkOut || !price){
        alert("Заполни все поля");
        return;
    }

    state.bookings.push({checkIn,checkOut,price});
    save();
    closeModal();
    render();
}

function prevMonth(){
    state.currentDate.setMonth(state.currentDate.getMonth()-1);
    render();
}

function nextMonth(){
    state.currentDate.setMonth(state.currentDate.getMonth()+1);
    render();
}

function exportData(){
    const data = JSON.stringify(state.bookings);
    const blob = new Blob([data],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url;
    a.download="bookings.json";
    a.click();
}

function importData(event){
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e){
        state.bookings = JSON.parse(e.target.result);
        save();
        render();
    };
    reader.readAsText(file);
}

render();

</script>
</body>
</html>
